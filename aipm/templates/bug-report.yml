name: Bug Report (Spec Tracked)
description: Report a bug that should be tracked against a spec
labels: ["needs-verification", "autospec"]
body:
  - type: input
    id: spec-id
    attributes:
      label: Spec / Change ID
      description: The openspec change ID this bug relates to
      placeholder: "20260330-feature-name"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
